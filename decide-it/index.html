<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legal - Decide It</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --bg: #ffffff;
            --text-main: #1a1a1a;
            --text-muted: #4b5563;
            --border: #e5e7eb;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .card {
            background: #fff;
            border: 2px solid #000;
            border-radius: 24px;
            padding: 3rem 2rem;
            text-align: center;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .logo {
            width: 72px;
            height: 72px;
            background: #000;
            border-radius: 16px;
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.25rem;
            font-weight: 800;
            color: white;
        }

        h1 {
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
            color: #000;
        }

        p {
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        .links {
            display: grid;
            gap: 0.75rem;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.875rem 1.5rem;
            background: #fff;
            border: 2px solid #000;
            border-radius: 12px;
            color: var(--text-main);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn:hover {
            background: #f9fafb;
            transform: translateX(4px);
        }

        .btn::after {
            content: '→';
            font-size: 1.25rem;
            font-weight: 400;
        }

        .footer {
            margin-top: 2.5rem;
            font-size: 0.875rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border);
            padding-top: 1rem;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="logo">D</div>
        <h1>Decide It</h1>
        <p>Legal Documentation & Policies</p>

        <div class="links">
            <a href="privacy.html" class="btn">Privacy Policy</a>
            <a href="terms.html" class="btn">Terms of Service</a>
        </div>

        <div class="footer">
            &copy; 2026 Solverse
        </div>
    </div>
</body>

</html>
