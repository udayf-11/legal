<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solverse - Legal Directory</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.1) 0px, transparent 50%);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 4rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        p { color: var(--text-muted); }

        .app-list {
            display: grid;
            gap: 1.5rem;
        }

        .app-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            color: inherit;
        }

        .app-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            background: rgba(30, 41, 59, 0.9);
        }

        .app-info {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .app-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #818cf8, #c084fc);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.5rem;
            color: white;
        }

        .app-name {
            font-weight: 600;
            font-size: 1.125rem;
        }

        .arrow {
            color: var(--primary);
            font-size: 1.5rem;
            transition: transform 0.3s;
        }

        .app-card:hover .arrow {
            transform: translateX(5px);
        }

        .footer {
            margin-top: 4rem;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.875rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Legal Portal</h1>
            <p>Select an application to view its legal documentation.</p>
        </header>
        
        <div class="app-list">
            <!-- Decide It -->
            <a href="decide-it/index.html" class="app-card">
                <div class="app-info">
                    <div class="app-icon">D</div>
                    <div class="app-name">Decide It</div>
                </div>
                <div class="arrow">→</div>
            </a>

            <!-- Placeholder for future apps -->
            <!--
            <a href="pro2/index.html" class="app-card">
                <div class="app-info">
                    <div class="app-icon">P2</div>
                    <div class="app-name">Project Two</div>
                </div>
                <div class="arrow">→</div>
            </a>
            -->
        </div>

        <div class="footer">
            &copy; 2026 Solverse. Managed via GitHub Pages.
        </div>
    </div>
</body>
</html>
