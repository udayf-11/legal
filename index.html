<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solverse - Legal Directory</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --bg: #ffffff;
            --text-main: #1a1a1a;
            --text-muted: #4b5563;
            --border: #e5e7eb;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            color: #000;
            margin-bottom: 0.5rem;
        }

        p { color: var(--text-muted); }

        .app-list {
            display: grid;
            gap: 1rem;
        }

        .app-card {
            background: #fff;
            border: 2px solid #000;
            border-radius: 16px;
            padding: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s;
            text-decoration: none;
            color: inherit;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .app-card:hover {
            border-color: var(--text-main);
            background: #f9fafb;
            transform: translateY(-2px);
        }

        .app-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .app-icon {
            width: 40px;
            height: 40px;
            background: #000;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.25rem;
            color: white;
        }

        .app-name {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .arrow {
            color: var(--text-muted);
            font-size: 1.25rem;
        }

        .footer {
            margin-top: 4rem;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.875rem;
            border-top: 1px solid var(--border);
            padding-top: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Legal Portal</h1>
            <p>Select an application to view its legal documentation.</p>
        </header>
        
        <div class="app-list">
            <!-- Decide It -->
            <a href="decide-it/index.html" class="app-card">
                <div class="app-info">
                    <div class="app-icon">D</div>
                    <div class="app-name">Decide It</div>
                </div>
                <div class="arrow">→</div>
            </a>

            <!-- Placeholder for future apps -->
            <!--
            <a href="pro2/index.html" class="app-card">
                <div class="app-info">
                    <div class="app-icon">P2</div>
                    <div class="app-name">Project Two</div>
                </div>
                <div class="arrow">→</div>
            </a>
            -->
        </div>

        <div class="footer">
            &copy; 2026 Solverse. Managed via GitHub Pages.
        </div>
    </div>
</body>
</html>
